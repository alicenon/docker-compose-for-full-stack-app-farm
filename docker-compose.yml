services:
  backend:
    # context: ./test-fastapi-app/
    # dockerfile: Dockerfile
    build: ./backend
    container_name: fastapi_backend
    networks:
      - app-network
    restart: always

  # frontend:
  #   build: ./test-react-app
  #   # ports:
  #     # - "9000:80"  # Tu PC (9000) -> Contenedor (80)
  #   restart: always
    # The React Frontend & NGINX Reverse Proxy Service
  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      # Map port 3000 on your host machine to port 80 inside the container (where Nginx is listening)
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: always

  nginx:
    build: ./frontend  # Forma corta (correcta)
    # build: 
    #   context: ./test-react-app/
    #   dockerfile: Dockerfile
      # image: docker-compose-for-full-stack-app-farm-frontend:latest
    container_name: nginx_proxy  # Opcional
    ports:
      - "80:80"  # ← ¡ESTE ES EL ÚNICO PUERTO QUE DEBES EXPOSER AHORA!
    # volumes:
    #   - ./test-react-app/nginx/nginx.conf:/etc/nginx/nginx.conf
      # - ./test-react-app/dist:/usr/share/nginx/html # cuidado con el dockerfile tenga esto y da forbiden
    depends_on:
      - backend
    networks:
      - app-network
    restart: always


    # Define the network and volume
networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local