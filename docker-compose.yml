version: "3"

services:
  backend:
    build: 
      context: ./backend
    # Importante: No uses container_name si quieres que Dokploy gestione logs/métricas
    networks:
      - dokploy-network
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/dbname

  frontend:
    build: 
      context: ./frontend
    depends_on:
      - backend
    networks:
      - dokploy-network
    restart: always
    # Para testeo por IP, mapea el puerto directamente:
    # ports:
    #   - "80:80" sin port en dokploy

  # Opcional: Base de datos persistente
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=dbname

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data: