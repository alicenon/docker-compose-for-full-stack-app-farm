version: "3"

services:
  backend:
    build: 
      context: ./backend
    # Importante: No uses container_name si quieres que Dokploy gestione logs/métricas
    networks:
      - dokploy-network
    restart: always
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/dbname

  frontend:
    build: 
      context: ./frontend
    depends_on:
      - backend
    networks:
      - dokploy-network
    restart: always
    # Para testeo por IP, mapea el puerto directamente:
    # ports:
    #   - "80:80" sin port en dokploy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.test-farm-frontend.rule=Host(`54.242.173.114.sslip.io`)"
      - "traefik.http.routers.test-farm-frontend.entrypoints=web"
      - "traefik.http.services.test-farm-frontend.loadbalancer.server.port=80"

  # Opcional: Base de datos persistente
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=dbname

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data: