# ./frontend/nginx/nginx.conf
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;  # Acepta cualquier hostname/IP

        # Ruta para el frontend (React)
        location / {
            root   /usr/share/nginx/html;  # Carpeta donde está tu build de React
            index  index.html index.htm;
            # Esto es vital para React Router: redirige todo al index.html
            try_files $uri $uri/ /index.html;
        }

        # Ruta para el backend (FastAPI) - proxy inverso
        location /api/ {
            proxy_pass http://backend:8000/;  # ← Nombre del servicio Docker
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Opcional: Configuración para manejar errores
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}